<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação de tabela no HTML</title>
</head>
<body>
    <!--Uma tabela tem três partes : o cabeçalho (thead), o corpo(tbody) e o rodapé (tfoot)-->
    <table border="1">
        <thead>
            <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Email</th>
            </tr>

            <tbody>
                <tr>
                    <td>0001</td>
                    <td>João</td>
                    <td>joao@gmail.com</td>
                </tr>
                <tr>
                    <td>0002</td>
                    <td>Maria</td>
                    <td>maria@gmail.com</td>
                </tr>
                <tr>
                    <td>0003</td>
                    <td>Quiteria</td>
                    <td>kiki@gmail.com</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>Lista de usuários</td>
                </tr>
            </tfoot>
        </thead>

    </table>
</body>
</html>
